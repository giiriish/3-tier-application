- name: Web Tier Setup (React Build + Nginx)
  hosts: web_servers
  become: yes

  tasks:

    # -----------------------------
    # Create web-tier folder
    # -----------------------------
    - name: Create web-tier directory
      file:
        path: /home/ec2-user/web-tier
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    # -----------------------------
    # (Optional) Copy code from control node
    # -----------------------------
    - name: Copy web-tier code
      copy:
        src: web-tier/
        dest: /home/ec2-user/web-tier/
        owner: ec2-user
        group: ec2-user

    # -----------------------------
    # Install Node.js (if not already installed)
    # -----------------------------
    - name: Install Node.js
      shell: amazon-linux-extras install nodejs -y

    # -----------------------------
    # Build React App
    # -----------------------------
    - name: Install dependencies and build app
      become_user: ec2-user
      shell: |
        cd /home/ec2-user/web-tier
        npm install
        npm run build
      args:
        executable: /bin/bash

    # -----------------------------
    # Install Nginx
    # -----------------------------
    - name: Install Nginx
      shell: amazon-linux-extras install nginx1 -y

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes
