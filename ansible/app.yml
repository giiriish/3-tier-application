- name: Install Node.js, PM2 and MariaDB on App Tier
  hosts: app_servers
  become: yes

  tasks:

    # -----------------------------
    # Install required packages
    # -----------------------------
    - name: Install required packages
      yum:
        name:
          - curl
          - git
        state: present

    # -----------------------------
    # Create directory for ec2-user
    # -----------------------------
    - name: Create app directory for ec2-user
      file:
        path: /home/ec2-user/app
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    # -----------------------------
    # Install MariaDB
    # -----------------------------
    - name: Install MariaDB server
      yum:
        name: mariadb-server
        state: present

    - name: Start and enable MariaDB
      service:
        name: mariadb
        state: started
        enabled: yes

    # -----------------------------
    # Install NVM (as ec2-user)
    # -----------------------------
    - name: Install NVM
      become_user: ec2-user
      shell: |
        cd /home/ec2-user
        curl -o- https://raw.githubusercontent.com/avizway1/aws_3tier_architecture/main/install.sh | bash
      args:
        executable: /bin/bash

    # -----------------------------
    # Install Node.js 16
    # -----------------------------
    - name: Install Node.js 16 using NVM
      become_user: ec2-user
      shell: |
        cd /home/ec2-user
        source ~/.bashrc
        nvm install 16
        nvm use 16
      args:
        executable: /bin/bash

    # -----------------------------
    # Install PM2
    # -----------------------------
    - name: Install PM2 globally
      become_user: ec2-user
      shell: |
        source ~/.bashrc
        npm install -g pm2
      args:
        executable: /bin/bash

    # -----------------------------
    # Enable PM2 startup
    # -----------------------------
    - name: Enable PM2 startup
      become_user: ec2-user
      shell: |
        source ~/.bashrc
        pm2 startup systemd -u ec2-user --hp /home/ec2-user
        pm2 save
      args:
        executable: /bin/bash
